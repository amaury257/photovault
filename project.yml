# project.yml — configuração do XcodeGen para gerar o PhotoVaultiCloudSync.xcodeproj
#
# Uso (em um Mac com Xcode, ex.: MacinCloud):
#   brew install xcodegen
#   xcodegen generate
#   ./build_ipa.sh
#
# O build sai SEM assinatura (a AltStore assina no momento da instalação).

name: PhotoVaultiCloudSync

options:
  bundleIdPrefix: com.photovault
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Sem assinatura: a AltStore reassina com o seu Apple ID ao instalar.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: ""

targets:
  PhotoVaultiCloudSync:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PhotoVaultiCloudSync
        excludes:
          - "Resources/Info.plist"      # usado via INFOPLIST_FILE, não como recurso
          - "*.entitlements"             # versão local não usa entitlements
    settings:
      base:
        PRODUCT_NAME: PhotoVault
        PRODUCT_BUNDLE_IDENTIFIER: com.photovault.PhotoVault
        INFOPLIST_FILE: PhotoVaultiCloudSync/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"    # iPhone e iPad
        # Sem entitlements (CODE_SIGN_ENTITLEMENTS intencionalmente ausente).
