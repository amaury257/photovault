# Compila o PhotoVault.ipa num macOS na nuvem, publica no GitHub Releases e
# gera a "source" da AltStore (apps.json) — para atualizações com 1 toque.
#
# Fluxo automatico: a cada push na main, este workflow:
#   1. compila o .ipa (nao assinado; a AltStore assina no aparelho)
#   2. cria/atualiza a Release "latest" com o PhotoVault.ipa
#   3. gera o apps.json (catalogo da AltStore) apontando para esse .ipa
#
# Voce adiciona a source UMA vez na AltStore e depois so toca em "Update".

name: Build IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write            # necessario para criar Releases

jobs:
  build:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER_REPO: ${{ github.repository }}
      VERSION: 1.0.${{ github.run_number }}
      BUILD_NUM: ${{ github.run_number }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Selecionar o Xcode mais recente
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar o projeto Xcode
        run: xcodegen generate

      - name: Compilar (archive sem assinatura, versão dinâmica)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PhotoVaultiCloudSync.xcodeproj \
            -scheme PhotoVaultiCloudSync \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/PhotoVault.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUM}"

      - name: Empacotar .ipa
        run: |
          set -euo pipefail
          APP_PATH="$(ls -d build/PhotoVault.xcarchive/Products/Applications/*.app | head -n 1)"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry PhotoVault.ipa Payload)
          rm -rf build/Payload

      - name: Gerar apps.json (source da AltStore)
        run: |
          set -euo pipefail
          SIZE=$(stat -f%z build/PhotoVault.ipa)
          DATE=$(date +%Y-%m-%d)
          DL="https://github.com/${OWNER_REPO}/releases/download/latest/PhotoVault.ipa"
          ICON="https://raw.githubusercontent.com/${OWNER_REPO}/main/assets/icon.png"
          cat > build/apps.json <<EOF
          {
            "name": "PhotoVault (amaury257)",
            "identifier": "com.photovault.source",
            "sourceURL": "https://github.com/${OWNER_REPO}/releases/download/latest/apps.json",
            "apps": [
              {
                "name": "PhotoVault",
                "bundleIdentifier": "com.photovault.PhotoVault",
                "developerName": "amaury257",
                "subtitle": "Backup unidirecional das fotos para o app Arquivos",
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "versionDescription": "Build automática ${BUILD_NUM}.",
                "downloadURL": "${DL}",
                "localizedDescription": "Faz backup unidirecional de todas as fotos e vídeos da galeria para uma pasta do app, visível no app Arquivos (No meu iPhone / PhotoVault). Apagar da galeria não remove do backup.",
                "iconURL": "${ICON}",
                "tintColor": "FF9500",
                "size": ${SIZE},
                "screenshotURLs": []
              }
            ]
          }
          EOF
          echo "apps.json gerado (size=${SIZE}, version=${VERSION})"

      - name: Publicar Release "latest" (ipa + apps.json)
        run: |
          set -euo pipefail
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            build/PhotoVault.ipa build/apps.json \
            --title "PhotoVault — última build (${VERSION})" \
            --notes "Build automática ${BUILD_NUM}. Instale/atualize pela AltStore."

      - name: Publicar artefato (para download direto do .ipa)
        uses: actions/upload-artifact@v4
        with:
          name: PhotoVault-ipa
          path: build/PhotoVault.ipa
          if-no-files-found: error
