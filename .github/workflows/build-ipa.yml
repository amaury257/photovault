# Compila o PhotoVault.ipa e publica a source da AltStore em LINK DIRETO
# (raw.githubusercontent.com) — sem redirecionamento, para evitar erros de TLS
# em redes que quebram o redirect do GitHub Releases.
#
# A cada push na main: compila o .ipa (nao assinado), copia .ipa + apps.json para
# a pasta pages/ e commita (com [skip ci]) — assim ficam servidos por link direto.

name: Build IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER_REPO: ${{ github.repository }}
      VERSION: 1.0.${{ github.run_number }}
      BUILD_NUM: ${{ github.run_number }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Selecionar o Xcode mais recente
        run: |
          XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n 1)"
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Instalar XcodeGen
        run: brew install xcodegen

      - name: Gerar o projeto Xcode
        run: xcodegen generate

      - name: Compilar (archive sem assinatura, versão dinâmica)
        run: |
          set -euo pipefail
          xcodebuild \
            -project PhotoVaultiCloudSync.xcodeproj \
            -scheme PhotoVaultiCloudSync \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/PhotoVault.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUM}"

      - name: Empacotar .ipa
        run: |
          set -euo pipefail
          APP_PATH="$(ls -d build/PhotoVault.xcarchive/Products/Applications/*.app | head -n 1)"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry PhotoVault.ipa Payload)
          rm -rf build/Payload

      - name: Gerar pages/ (source + ipa em link direto)
        run: |
          set -euo pipefail
          mkdir -p pages
          cp build/PhotoVault.ipa pages/PhotoVault.ipa
          SIZE=$(stat -f%z build/PhotoVault.ipa)
          DATE=$(date +%Y-%m-%d)
          RAW="https://raw.githubusercontent.com/${OWNER_REPO}/main/pages"
          ICON="https://raw.githubusercontent.com/${OWNER_REPO}/main/assets/icon.png"
          cat > pages/apps.json <<EOF
          {
            "name": "iAmaury (amaury257)",
            "identifier": "com.photovault.source",
            "sourceURL": "${RAW}/apps.json",
            "apps": [
              {
                "name": "iAmaury",
                "bundleIdentifier": "com.photovault.PhotoVault",
                "developerName": "amaury257",
                "subtitle": "Backup unidirecional das fotos para a pasta que você escolher",
                "version": "${VERSION}",
                "versionDate": "${DATE}",
                "versionDescription": "Build automática ${BUILD_NUM}.",
                "downloadURL": "${RAW}/PhotoVault.ipa",
                "localizedDescription": "Faz backup unidirecional de todas as fotos e vídeos da galeria para uma pasta de destino escolhida por você (pode ser dentro do iCloud Drive) ou, se nenhuma for escolhida, para uma pasta local visível no app Arquivos (No meu iPhone / iAmaury). Apagar da galeria não remove do backup.",
                "iconURL": "${ICON}",
                "tintColor": "FF9500",
                "size": ${SIZE},
                "screenshotURLs": []
              }
            ]
          }
          EOF
          echo "pages/apps.json gerado (size=${SIZE}, version=${VERSION})"

      - name: Commitar pages/ (link direto) e Release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f pages/apps.json pages/PhotoVault.ipa
          git commit -m "chore: publica PhotoVault na source (link direto) [skip ci]" || echo "sem mudanca"
          git push
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest build/PhotoVault.ipa \
            --title "PhotoVault — última build (${VERSION})" \
            --notes "Build ${BUILD_NUM}."

      - name: Publicar artefato (download direto do .ipa)
        uses: actions/upload-artifact@v4
        with:
          name: PhotoVault-ipa
          path: build/PhotoVault.ipa
          if-no-files-found: error
